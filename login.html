<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — Sanse Capital</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --dark: #0a0a0f;
      --dark-2: #12121a;
      --dark-3: #1a1a24;
      --border: rgba(255,255,255,0.06);
      --text: #e8e6e3;
      --text-muted: #7a7a85;
      --gold: #C9A84C;
      --gold-dim: rgba(201,168,76,0.12);
      --gold-glow: rgba(201,168,76,0.25);
      --green: #4ECB8D;
      --red: #E74C5E;
      --radius: 8px;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ═══ BACKGROUND ═══ */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 600px 400px at 20% 30%, rgba(201,168,76,0.05) 0%, transparent 70%),
        radial-gradient(ellipse 500px 500px at 80% 70%, rgba(201,168,76,0.03) 0%, transparent 70%),
        var(--dark);
    }
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* ═══ CARD ═══ */
    .card {
      position: relative; z-index: 1;
      width: 100%;
      max-width: 420px;
      margin: 24px;
    }
    .card-inner {
      background: var(--dark-2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 20px;
      letter-spacing: 2px;
      text-align: center;
      margin-bottom: 8px;
    }
    .logo span { color: var(--gold); }
    .card-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 24px;
      text-align: center;
      margin-bottom: 8px;
    }
    .card-sub {
      text-align: center;
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 36px;
    }

    /* ═══ FORM ═══ */
    .field {
      margin-bottom: 20px;
    }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .field input {
      width: 100%;
      padding: 14px 16px;
      background: var(--dark-3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border 0.3s;
    }
    .field input:focus {
      border-color: var(--gold);
    }
    .field input::placeholder {
      color: rgba(255,255,255,0.2);
    }

    .remember-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .remember-row label {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--text-muted);
      cursor: pointer;
    }
    .remember-row input[type="checkbox"] {
      accent-color: var(--gold);
      width: 16px; height: 16px;
    }
    .forgot-link {
      font-size: 13px; color: var(--gold);
      text-decoration: none;
    }
    .forgot-link:hover { text-decoration: underline; }

    .btn-submit {
      width: 100%;
      padding: 16px;
      background: var(--gold);
      color: #0a0a0f;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
    }
    .btn-submit:hover {
      background: #d9b35a;
      transform: translateY(-1px);
      box-shadow: 0 6px 24px var(--gold-glow);
    }
    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .btn-submit.loading {
      color: transparent;
    }
    .btn-submit.loading::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 20px; height: 20px;
      margin: -10px 0 0 -10px;
      border: 2px solid rgba(10,10,15,0.3);
      border-top-color: #0a0a0f;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ═══ ERROR ═══ */
    .error-msg {
      background: rgba(231,76,94,0.08);
      border: 1px solid rgba(231,76,94,0.2);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 13px;
      color: var(--red);
      margin-bottom: 20px;
      display: none;
    }
    .error-msg.show { display: block; }
    .error-msg.pending {
      background: rgba(201,168,76,0.10);
      border: 1px solid rgba(201,168,76,0.3);
      color: var(--gold);
    }
    .error-msg.pending .pending-icon {
      display: inline-block;
      margin-bottom: 8px;
      font-size: 24px;
    }
    .error-msg.pending .pending-title {
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 4px;
    }
    .error-msg.pending .pending-sub {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    /* ═══ LINKS ═══ */
    .card-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--text-muted);
    }
    .card-footer a {
      color: var(--gold);
      font-weight: 600;
      text-decoration: none;
    }
    .card-footer a:hover { text-decoration: underline; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
    }
    .back-link:hover { color: var(--text); }

    /* ═══ TOAST ═══ */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      padding: 14px 24px;
      border-radius: var(--radius);
      font-size: 14px; font-weight: 600;
      z-index: 1000;
      animation: slideIn 0.3s ease;
    }
    .toast.error {
      background: rgba(231,76,94,0.15);
      border: 1px solid rgba(231,76,94,0.3);
      color: var(--red);
    }
    @keyframes slideIn {
      from { transform: translateX(100px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="bg-grid"></div>

  <div class="card">
    <div class="card-inner">
      <div class="logo">SANSE <span>CAPITAL</span></div>
      <h1 class="card-title">Bienvenido</h1>
      <p class="card-sub">Ingresa a tu cuenta para acceder a tu dashboard</p>

      <div class="error-msg" id="errorMsg"></div>

      <div class="field">
        <label>Correo electrónico</label>
        <input type="email" id="login-email" placeholder="tu@correo.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
      </div>

      <div class="remember-row">
        <label>
          <input type="checkbox" id="remember-me" checked> Recordarme
        </label>
      </div>

      <button class="btn-submit" id="loginBtn" onclick="handleLogin()">Iniciar Sesión</button>

      <div class="card-footer">
        ¿No tienes cuenta? <a href="register.html">Regístrate aquí</a>
      </div>
    </div>

    <a href="index.html" class="back-link">← Volver al inicio</a>
  </div>

  <script>
    const API_BASE = 'https://sanse-backend-production.up.railway.app/api';

    async function handleLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const remember = document.getElementById('remember-me').checked;
      const btn = document.getElementById('loginBtn');
      const errorEl = document.getElementById('errorMsg');

      errorEl.classList.remove('show', 'pending');

      if (!email || !password) {
        errorEl.textContent = 'Ingresa tu correo y contraseña.';
        errorEl.classList.add('show');
        return;
      }

      btn.disabled = true;
      btn.classList.add('loading');

      try {
        const resp = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await resp.json();

        if (!resp.ok) {
          const isPending = data.pending === true;
          const isBlocked = data.blocked === true;

          if (isPending) {
            errorEl.classList.remove('pending');
            void errorEl.offsetWidth;
            errorEl.innerHTML = `
              <div class="pending-icon">⏳</div>
              <div class="pending-title">Cuenta en revisión</div>
              <div class="pending-sub">Tu registro está siendo revisado por el equipo de Sanse Capital. Te notificaremos cuando tu cuenta sea aprobada. Esto puede tomar hasta 24 horas hábiles.</div>
            `;
            errorEl.classList.add('show', 'pending');
            btn.classList.remove('loading');
            btn.disabled = false;
            return;
          }

          if (isBlocked) {
            errorEl.classList.remove('pending');
            errorEl.textContent = '🚫 Tu cuenta ha sido suspendida. Contacta al administrador.';
            errorEl.classList.add('show');
            btn.classList.remove('loading');
            btn.disabled = false;
            return;
          }

          throw new Error(data.error || data.message || 'Credenciales inválidas');
        }

        // Guardar tokens
        const storage = remember ? localStorage : sessionStorage;
        storage.setItem('sanse_access_token', data.accessToken);
        storage.setItem('sanse_refresh_token', data.refreshToken);
        storage.setItem('sanse_user', JSON.stringify(data.user));

        // Redirigir según rol
        if (data.user.role === 'admin') {
          window.location.href = 'admin.html';
        } else {
          window.location.href = 'dashboard.html';
        }

      } catch (err) {
        btn.classList.remove('loading');
        btn.disabled = false;
        errorEl.classList.remove('pending');
        errorEl.textContent = err.message || 'Error de conexión con el servidor.';
        errorEl.classList.add('show');
      }
    }

    // Enter para submit
    document.getElementById('login-password').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
    document.getElementById('login-email').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('login-password').focus();
    });

    // Si ya tiene sesión activa, redirigir
    const existingToken = localStorage.getItem('sanse_access_token') || sessionStorage.getItem('sanse_access_token');
    if (existingToken) window.location.href = 'dashboard.html';
  </script>
</body>
</html>
